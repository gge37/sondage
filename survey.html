<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sondage — Questions</title>
  <link rel="stylesheet" href="style.css" />

  <!-- SheetJS pour générer Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="assets/logo.png" class="logo" />
      <div>
        <h1>Sondage — Vos réponses</h1>
        <div class="small">6 questions rapides, puis un commentaire libre</div>
      </div>
    </div>

    <div id="identifierDisplay" class="small form-row"></div>

    <form id="surveyForm">
      <!-- questions identiques à ta version précédente -->
      <div class="question">
        <label>Q1. Lorem ipsum dolor sit amet ?</label>
        <input name="q1" type="text" />
      </div>

      <div class="question">
        <label>Q2. Choix multiple — Lorem ipsum ?</label>
        <label><input type="checkbox" name="q2" value="Option A"> Option A</label><br>
        <label><input type="checkbox" name="q2" value="Option B"> Option B</label><br>
        <label><input type="checkbox" name="q2" value="Option C"> Option C</label>
      </div>

      <div class="question">
        <label>Q3. Choix unique — Lorem ipsum ?</label>
        <label><input type="radio" name="q3" value="Oui"> Oui</label><br>
        <label><input type="radio" name="q3" value="Non"> Non</label><br>
        <label><input type="radio" name="q3" value="Peut-être"> Peut-être</label>
      </div>

      <div class="question">
        <label>Q4. Lorem ipsum dolor sit amet ?</label>
        <input name="q4" type="text" />
      </div>

      <div class="question">
        <label>Q5. Lorem ipsum dolor sit amet ?</label>
        <input name="q5" type="text" />
      </div>

      <div class="question">
        <label>Q6. Lorem ipsum dolor sit amet ?</label>
        <input name="q6" type="text" />
      </div>

      <div class="question">
        <label>Note globale 0 à 20</label>
        <input name="note" type="number" min="0" max="20" value="10" />
      </div>

      <div class="question">
        <label>Commentaire libre</label>
        <textarea name="comment" minlength="2" maxlength="3000"></textarea>
      </div>

      <div class="actions">
        <button type="button" id="backBtn" class="btn btn-ghost">Retour</button>
        <button type="submit" class="btn btn-primary">Envoyer</button>
      </div>
    </form>
  </div>

<script>
/* ---------------------------
   CONFIGURATION WEB3FORMS
---------------------------- */
const WEB3FORMS_KEY = "d7a2d8d8-fcfb-4cea-8135-e65495fe629a";
const DEST_EMAIL = "37aureliengge@gmail.com";

/* ---------------------------
   IDENTIFIANT
---------------------------- */
const id = sessionStorage.getItem("survey_identifier");
if (!id) {
  alert("Identifiant manquant");
  location.href = "index.html";
}
document.getElementById("identifierDisplay").textContent = "Identifiant : " + id;

/* ---------------------------
   GÉNÉRATION EXCEL (SheetJS)
---------------------------- */
function generateExcelBase64(payload) {
  const data = [
    ["Identifiant","Q1","Q2","Q3","Q4","Q5","Q6","Note","Commentaire"],
    [
      payload.identifier,
      payload.answers.q1,
      payload.answers.q2.join("; "),
      payload.answers.q3,
      payload.answers.q4,
      payload.answers.q5,
      payload.answers.q6,
      payload.answers.note,
      payload.comment
    ]
  ];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, "Sondage");

  const binary = XLSX.write(wb, { bookType: "xlsx", type: "binary" });
  let bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return btoa(String.fromCharCode(...bytes));
}

/* ---------------------------
   ENVOI VIA WEB3FORMS
---------------------------- */
async function sendViaWeb3Forms(payload, excelBase64) {
  const filename = "sondage_" + payload.identifier + ".xlsx";

  const formData = new FormData();
  formData.append("access_key", WEB3FORMS_KEY);
  formData.append("subject", "Réponse sondage - ID " + payload.identifier);
  formData.append("email", DEST_EMAIL);
  formData.append("message", "Réponses du sondage en pièce jointe.");

  // Pièce jointe Excel en base64
  formData.append("attachments", new Blob(
    [excelBase64],
    { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }
  ), filename);

  const response = await fetch("https://api.web3forms.com/submit", {
    method: "POST",
    body: formData
  });

  return response.ok;
}

/* ---------------------------
   FORMULAIRE
---------------------------- */
document.getElementById("surveyForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const fd = new FormData(e.target);

  const q2 = [...document.querySelectorAll('input[name="q2"]:checked')].map(x => x.value);

  const payload = {
    identifier: id,
    answers: {
      q1: fd.get("q1") || "",
      q2,
      q3: fd.get("q3") || "",
      q4: fd.get("q4") || "",
      q5: fd.get("q5") || "",
      q6: fd.get("q6") || "",
      note: Number(fd.get("note"))
    },
    comment: (fd.get("comment") || "").trim()
  };

  // Validation
  if (payload.comment.length < 2) {
    alert("Commentaire trop court");
    return;
  }

  // Génération Excel
  let excelBase64;
  try {
    excelBase64 = generateExcelBase64(payload);
  } catch (err) {
    alert("Erreur génération Excel");
    return;
  }

  // Envoi Web3Forms
  try {
    const ok = await sendViaWeb3Forms(payload, excelBase64);
    if (ok) {
      alert("Merci ! Vos réponses ont été envoyées.");
      sessionStorage.removeItem("survey_identifier");
      location.href = "index.html";
    } else {
      throw new Error("Web3Forms error");
    }
  } catch (err) {
    alert("Échec de l’envoi automatique. Vous pouvez envoyer le fichier manuellement.");
  }
});
</script>

</body>
</html>
